# =========================================
# Rules
# Order matters. Put frequent DIRECT domains early. Rules are matched top-down.
# =========================================
rules:
  # --- DIRECT fast path ---
  - RULE-SET,private-ip,DIRECT,no-resolve
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT

  # Default-direct groups (small rule sets, fast match)
  - RULE-SET,apple-domain,APPLE
  - RULE-SET,steam-cn,STEAM-CN
  - RULE-SET,microsoft-domain,MICROSOFT

  # CN domains direct (bulk domestic traffic)
  - RULE-SET,direct-domain,DIRECT
  - RULE-SET,cn-ip,DIRECT,no-resolve
  - GEOIP,CN,DIRECT

  # Block QUIC (UDP 443) for traffic that will be proxied.
  # Browsers fall back to TCP HTTPS seamlessly.
  # Direct traffic already matched above, unaffected.
  - AND,((NETWORK,udp),(DST-PORT,443)),REJECT

  # --- PROXY path (now TCP-only, clean tunnel) ---
  - RULE-SET,ai-domain,AI
  - RULE-SET,netflix-domain,STREAM
  - RULE-SET,youtube-domain,STREAM
  - RULE-SET,disney-domain,STREAM
  - RULE-SET,spotify-domain,STREAM
  - RULE-SET,telegram-domain,TELEGRAM
  - RULE-SET,telegram-ip,TELEGRAM,no-resolve
  - RULE-SET,signal-domain,TELEGRAM
  - RULE-SET,steam-domain,STEAM
  - RULE-SET,proxy-domain,PROXY

  # Final
  - MATCH,FINAL
