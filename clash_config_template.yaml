# =========================================
# Universal mobile-first config for Mihomo + Stash
# - direct proxy injection (no proxy-provider)
# - conservative syntax for cross-compatibility
# - optimized for mobile, still good on desktop
# =========================================

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true

# --- API ---
external-controller: 127.0.0.1:9090
secret: ""

# =========================================
# DNS
# IPv6 strategy:
#   DIRECT → full dual-stack; tcp-concurrent races v4/v6, behaves like no proxy
#   PROXY  → fake-ip forwards domain to node; v4-only nodes resolve to v4 naturally
# =========================================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    # QQ / 微信 CDN — 真实 DNS 保证就近调度
    - "*.qpic.cn"
    - "*.gtimg.cn"
    - "*.qq.com"
    - "*.weixin.qq.com"
    - "*.wechat.com"
    - "*.weixinbridge.com"
    - "*.tenpay.com"
    # iCloud 中国（云上贵州）— 国内 CDN，DNS 就近调度
    - "*.icloud.com.cn"
    - "*.apple.com.cn"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - "[2400:3200::1]"
    - "[2402:4e00::]"

# =========================================
# TUN
# conservative settings for Mihomo + Stash
# =========================================
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true

# =========================================
# Sniffer (Mihomo only; Stash ignores this key)
# =========================================
sniffer:
  enable: true
  skip-domain:
    - "*.qq.com"
    - "*.qpic.cn"
    - "*.gtimg.cn"
    - "*.weixin.qq.com"
    - "*.wechat.com"
    - "*.weixinbridge.com"
    - "*.tenpay.com"
    - "*.icloud.com.cn"
    - "*.apple.com.cn"
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# =========================================
# Proxies – generate_config.py will inject nodes here
# =========================================
proxies: []

# =========================================
# Proxy Groups
# =========================================
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      # __INJECT_ALL__
      - DIRECT

  - name: PROXY_NOHK
    type: select
    proxies:
      # __INJECT_NOHK__

  - name: STREAM
    type: select
    proxies:
      - PROXY
      - PROXY_NOHK
      - DIRECT

  - name: AI
    type: select
    proxies:
      - PROXY
      - PROXY_NOHK
      - DIRECT

  - name: IM
    type: select
    proxies:
      - PROXY
      - PROXY_NOHK
      - DIRECT

  - name: STEAM
    type: select
    proxies:
      - PROXY
      - PROXY_NOHK
      - DIRECT

  - name: STEAM-CN
    type: select
    proxies:
      - DIRECT
      - PROXY

  - name: GITHUB
    type: select
    proxies:
      - PROXY
      - PROXY_NOHK
      - DIRECT

  - name: MICROSOFT
    type: select
    proxies:
      - DIRECT
      - PROXY
      - PROXY_NOHK

  - name: APPLE
    type: select
    proxies:
      - DIRECT
      - PROXY

  - name: FINAL
    type: select
    proxies:
      - PROXY
      - PROXY_NOHK
      - DIRECT

# =========================================
